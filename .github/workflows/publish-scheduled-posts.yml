name: Publish Scheduled Blog Posts

on:
  schedule:
    # Run every day at 8 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check for scheduled posts
        id: check_posts
        run: |
          TODAY=$(date +%Y-%m-%d)
          DRAFT_DIR="src/pages/blog/_drafts"
          
          if [ -d "$DRAFT_DIR" ]; then
            # Find posts with filename matching today's date
            POSTS=$(find "$DRAFT_DIR" -name "*-$TODAY-*.astro" 2>/dev/null || true)
            if [ -n "$POSTS" ]; then
              echo "found_posts=true" >> $GITHUB_OUTPUT
              echo "posts=$POSTS" >> $GITHUB_OUTPUT
            else
              echo "found_posts=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "found_posts=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Publish posts
        if: steps.check_posts.outputs.found_posts == 'true'
        run: |
          DRAFT_DIR="src/pages/blog/_drafts"
          TODAY=$(date +%Y-%m-%d)
          
          # Move posts from _drafts to published
          for post in $(find "$DRAFT_DIR" -name "*-$TODAY-*.astro" 2>/dev/null || true); do
            FILENAME=$(basename "$post")
            # Remove date prefix from filename (e.g., "2026-03-15-" becomes "")
            NEWNAME=$(echo "$FILENAME" | sed "s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//")
            mv "$post" "src/pages/blog/$NEWNAME"
            echo "Published: $NEWNAME"
          done
      
      - name: Commit and push
        if: steps.check_posts.outputs.found_posts == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/pages/blog/
          git commit -m "Publish scheduled blog posts for $(date +%Y-%m-%d)"
          git push

