name: Publish Scheduled Blog Posts

on:
  schedule:
    # Run every day at 8 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      publish_date:
        description: 'Date to publish (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Determine date to publish
        id: get_date
        run: |
          if [ -n "${{ github.event.inputs.publish_date }}" ]; then
            PUBLISH_DATE="${{ github.event.inputs.publish_date }}"
          else
            PUBLISH_DATE=$(date +%Y-%m-%d)
          fi
          echo "publish_date=$PUBLISH_DATE" >> $GITHUB_OUTPUT
          echo "Publishing posts for: $PUBLISH_DATE"
      
      - name: Check for scheduled posts
        id: check_posts
        run: |
          PUBLISH_DATE="${{ steps.get_date.outputs.publish_date }}"
          DRAFT_DIR="src/pages/blog/_drafts"
          
          if [ -d "$DRAFT_DIR" ]; then
            POSTS=$(find "$DRAFT_DIR" -name "*$PUBLISH_DATE-*.astro" 2>/dev/null || true)
            if [ -n "$POSTS" ]; then
              echo "found_posts=true" >> $GITHUB_OUTPUT
              echo "posts=$POSTS" >> $GITHUB_OUTPUT
            else
              echo "found_posts=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "found_posts=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Publish posts and update index
        if: steps.check_posts.outputs.found_posts == 'true'
        run: |
          set -x
          PUBLISH_DATE="${{ steps.get_date.outputs.publish_date }}"
          DRAFT_DIR="src/pages/blog/_drafts"
          
          echo "Looking for posts dated: $PUBLISH_DATE in $DRAFT_DIR"
          
          for post in $(find "$DRAFT_DIR" -name "*$PUBLISH_DATE-*.astro" 2>/dev/null || true); do
            FILENAME=$(basename "$post")
            NEWNAME=$(echo "$FILENAME" | sed "s/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//")
            mv "$post" "src/pages/blog/$NEWNAME"
            echo "Published: $NEWNAME"
          done
          
          echo "Done publishing posts"
      
      - name: Commit and push
        if: steps.check_posts.outputs.found_posts == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/pages/blog/
          git commit -m "Publish scheduled blog posts for ${{ steps.get_date.outputs.publish_date }}"
          git push